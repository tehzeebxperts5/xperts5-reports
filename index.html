  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:         #f0f4ff;
    --white:      #ffffff;
    --border:     #c5d3f0;
    --card-border:#7b9de0;
    --accent:     #1a3ccc;
    --accent2:    #2c52e8;
    --accent-lt:  #e8eeff;
    --accent-mid: #4a6ef5;
    --navy:       #0d1f6e;
    --text:       #0f1a3a;
    --muted:      #6b7daa;
    --muted2:     #b0bcd8;
    --danger:     #d93025;
    --radius:     18px;
    --shadow:     0 6px 28px rgba(26,60,204,0.10);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 0% 0%, rgba(44,82,232,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 100% 100%, rgba(13,31,110,0.06) 0%, transparent 60%);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1f6e 0%, #1a3ccc 60%, #2c52e8 100%);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 1.4rem 2.5rem 0;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 4px 24px rgba(13,31,110,0.25);
  }
  .header-top { display:flex; flex-direction:column; align-items:center; gap:1.1rem; margin-bottom:1.2rem; }
  .brand-row { display:flex; align-items:center; justify-content:center; gap:16px; }

function toISO(d) {
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

  const dim = new Date(year, month+1, 0).getDate();
  return [
    { week:1, start:1,  end:7   },

}
function getDates(year, month, start, end) {
  const out = [];

// ── Sync status ───────────────────────────────────────────────────────
function setSyncStatus(state, text) {
  const dot  = document.getElementById("sync-dot");
  const label = document.getElementById("sync-text");
  dot.className  = "sync-dot " + state;
  label.textContent = text;
}

// ── Firebase real-time listener ───────────────────────────────────────
const entriesCol = collection(db, "entries");
const q = query(entriesCol, orderBy("date","asc"));

onSnapshot(q,
  (snapshot) => {
    allEntries = {};
    snapshot.forEach(docSnap => {
      const e = docSnap.data();
      allEntries[e.name + "_" + e.date] = { ...e, id: docSnap.id };
    });
    setSyncStatus("live", "Live — all data synced");
    renderCards();
    if (modalStaff) openModal(modalStaff);
  },
  (error) => {
    setSyncStatus("error", "Connection error — check internet");
    showToast("⚠️ Database error: " + error.message, "error");
  }
);

// ── Init date selects ─────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  populateDateSelects();
  const ranges = getWeekRanges(viewYear, viewMonth);
  const td = today.getDate();
  const found = ranges.find(r => td >= r.start && td <= r.end);
  if (found) viewWeek = found.week;
  renderNav();
});

function getDaysInMonth(month, year) { return new Date(year, month, 0).getDate(); }

function updateDays() {
  const dayEl  = document.getElementById("ef-day");
  const monEl  = document.getElementById("ef-month");
  const yearEl = document.getElementById("ef-year");
  const curDay = parseInt(dayEl.value) || 1;
  const month  = parseInt(monEl.value) || 1;
  const year   = parseInt(yearEl.value) || today.getFullYear();
  const maxDay = getDaysInMonth(month, year);
  dayEl.innerHTML = Array.from({length:maxDay},(_,i) =>
    `<option value="${String(i+1).padStart(2,"0")}">${String(i+1).padStart(2,"0")}</option>`
  ).join("");
  dayEl.value = String(Math.min(curDay, maxDay)).padStart(2,"0");
}

function populateDateSelects() {
  const monEl  = document.getElementById("ef-month");
  const yearEl = document.getElementById("ef-year");
  const mNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  monEl.innerHTML = mNames.map((m,i) =>
    `<option value="${String(i+1).padStart(2,"0")}">${m}</option>`
  ).join("");
  const yr = today.getFullYear();
  yearEl.innerHTML = [yr-1,yr,yr+1].map(y => `<option value="${y}">${y}</option>`).join("");
  monEl.value  = String(today.getMonth()+1).padStart(2,"0");
  yearEl.value = String(today.getFullYear());
  updateDays();
  document.getElementById("ef-day").value = String(today.getDate()).padStart(2,"0");
  monEl.addEventListener("change", updateDays);
  yearEl.addEventListener("change", updateDays);
}

function getSelectedISO() {
  const d = document.getElementById("ef-day").value;
  const m = document.getElementById("ef-month").value;
  const y = document.getElementById("ef-year").value;
  return `${y}-${m}-${d}`;
}

// ── Nav ───────────────────────────────────────────────────────────────
window.setDept = function(dept, el) {
  activeDept = dept;
  document.querySelectorAll(".dept-tab").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderCards();
};

window.shiftMonth = function(dir) {
  viewMonth += dir;
  if (viewMonth < 0)  { viewMonth=11; viewYear--; }
  if (viewMonth > 11) { viewMonth=0;  viewYear++; }
  viewWeek = 1;
  renderNav();
  renderCards();
};

window.selectWeek = function(w) {
  viewWeek = w;
  renderNav();
  renderCards();
  if (modalStaff) openModal(modalStaff);
};

function renderNav() {
  document.getElementById("month-label").textContent = MONTH_NAMES[viewMonth]+" "+viewYear;
  const ranges = getWeekRanges(viewYear, viewMonth);
  document.getElementById("week-pills").innerHTML = ranges.map(r => `
    <button class="week-pill ${r.week===viewWeek?"active":""}" onclick="selectWeek(${r.week})">
      Week ${r.week} <span style="font-weight:400;opacity:.75">${r.start}–${r.end}</span>
    </button>
  `).join("");
}

// ── Render cards ──────────────────────────────────────────────────────
function renderCards() {
  const ranges  = getWeekRanges(viewYear, viewMonth);
  const range   = ranges.find(r => r.week === viewWeek);
  if (!range) return;
  const dates    = getDates(viewYear, viewMonth, range.start, range.end);
  const filtered = activeDept==="all" ? STAFF : STAFF.filter(s => s.dept===activeDept);
  const count    = filtered.length;

  const cardHTMLs = filtered.map(staff => {
    const rows = dates.map(iso => ({
      iso,
      entry: allEntries[staff.name+"_"+iso] || null
    }));
    const hasAny = rows.some(r => r.entry);
    let rowsHtml;
    if (!hasAny) {
      rowsHtml = "<div class=\"card-empty-msg\">No entries this week yet</div>";
    } else {
      rowsHtml = "<div class=\"card-rows\">" +
        rows.map(r => `
          <div class="card-row ${r.iso===todayISO?"today-row":""} ${r.entry?"":"card-row-empty"}">
            <div class="card-row-day">${fmtDay(r.iso)}</div>
            <div class="card-row-date">${fmtDisplay(r.iso)}</div>
            <div class="card-row-task">${r.entry ? escHtml(r.entry.tasks) : "—"}</div>
          </div>
        `).join("") + "</div>";
    }
    return `<div class="emp-card" onclick="openModal('${staff.name}')">
      <div class="emp-card-name">${staff.name}</div>
      <div class="emp-card-role">${staff.role}</div>
      ${rowsHtml}
    </div>`;
  });

  const grid = document.getElementById("cards-grid");
  grid.className = "cards-grid count-"+count;
  if (count === 5) {
    grid.innerHTML = cardHTMLs.slice(0,3).join("") +
      "<div class=\"last-row\">" + cardHTMLs.slice(3).join("") + "</div>";
  } else {
    grid.innerHTML = cardHTMLs.join("");
  }
}

// ── Submit ────────────────────────────────────────────────────────────
window.submitEntry = async function() {
  const name  = document.getElementById("ef-name").value;
  const date  = getSelectedISO();
  const tasks = document.getElementById("ef-task").value.trim();
  if (!name || !date || !tasks) { showToast("⚠️ Please fill in all fields.", "warn"); return; }

  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Saving...";
  setSyncStatus("saving", "Saving entry...");

  try {
    const docId = name + "_" + date;
    await setDoc(doc(db, "entries", docId), { name, date, tasks, updatedAt: Date.now() });

    // Navigate to correct week
    const d = new Date(date+"T00:00:00");
    viewYear  = d.getFullYear();
    viewMonth = d.getMonth();
    const ranges = getWeekRanges(viewYear, viewMonth);
    const found  = ranges.find(r => d.getDate()>=r.start && d.getDate()<=r.end);
    if (found) viewWeek = found.week;
    renderNav();

    document.getElementById("ef-task").value = "";
    showToast("✅ Saved for "+name+"!", "success");
  } catch(err) {
    setSyncStatus("error", "Save failed");
    showToast("❌ Error: " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Save";
  }
};

// ── Delete ────────────────────────────────────────────────────────────
window.deleteEntry = async function(docId, event) {
  event.stopPropagation();
  if (!confirm("Delete this entry?")) return;
  try {
    await deleteDoc(doc(db, "entries", docId));
    showToast("🗑️ Entry deleted.", "warn");
  } catch(err) {
    showToast("❌ Delete failed: " + err.message, "error");
  }
};

// ── Modal ─────────────────────────────────────────────────────────────
window.openModal = function(staffName) {
  modalStaff = staffName;
  const staff  = STAFF.find(s => s.name===staffName);
  const ranges = getWeekRanges(viewYear, viewMonth);
  const range  = ranges.find(r => r.week===viewWeek);
  if (!range) return;
  const dates = getDates(viewYear, viewMonth, range.start, range.end);
  const rows  = dates.map(iso => ({
    iso, day: fmtDay(iso),
    entry: allEntries[staffName+"_"+iso] || null
  }));
  document.getElementById("modal-content").innerHTML = `
    <div class="modal-name">${staffName}</div>
    <div class="modal-role">${staff.role}</div>
    <div class="modal-week-label">Week ${viewWeek} · ${MONTH_NAMES[viewMonth]} ${viewYear} · ${range.start}–${range.end} ${MONTH_NAMES[viewMonth]}</div>
    <table class="modal-table">
      <thead><tr><th>Day</th><th>Date</th><th>Tasks Done</th><th></th></tr></thead>
      <tbody>
        ${rows.map(r => `
          <tr class="${r.iso===todayISO?"today-row":""} ${r.entry?"":"empty-row"}">
            <td class="col-day">${r.day}</td>
            <td class="col-date">${fmtDisplay(r.iso)}</td>
            <td class="col-task">${r.entry ? escHtml(r.entry.tasks) : "No entry"}</td>
            <td class="col-del">${r.entry ? `<button class="btn-del-sm" onclick="deleteEntry('${r.entry.id}',event)">✕</button>` : ""}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
  document.getElementById("modal").classList.add("open");
  setTimeout(startSaber, 50);
};

window.closeModal = function() {
  document.getElementById("modal").classList.remove("open");
  modalStaff = null;
  stopSaber();
};

window.handleModalClick = function(e) {
  const overlay = document.getElementById("modal");
  const wrap    = document.getElementById("modal-glow-wrap");
  if (e.target === overlay) closeModal();
};

// ── Toast ─────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast show t-"+type;
  setTimeout(() => t.className = "toast", 3200);
}

// ── Saber animation ───────────────────────────────────────────────────
let saberRAF = null;
window.startSaber = function() {
  const canvas = document.getElementById("saber-canvas");
  const wrap   = document.getElementById("modal-glow-wrap");
  if (!canvas || !wrap) return;
  canvas.width  = wrap.offsetWidth  + 12;
  canvas.height = wrap.offsetHeight + 12;
  const ctx   = canvas.getContext("2d");
  const R     = 24;
  let   angle = 0;
  const speed = 0.0018;

  function getRoundedRectPoint(t, W, H, R) {
    const arc   = Math.PI/2 * R;
    const st    = W-2*R, sr = H-2*R, sb = W-2*R, sl = H-2*R;
    const total = 2*(st+sr) + 4*arc;
    const d = t * total;
    const segs = [
      { len:st,  type:"line", x0:R,   y0:0,   dx:1,  dy:0  },
      { len:arc, type:"arc",  cx:W-R, cy:R,   start:-Math.PI/2, dir:1 },
      { len:sr,  type:"line", x0:W,   y0:R,   dx:0,  dy:1  },
      { len:arc, type:"arc",  cx:W-R, cy:H-R, start:0,          dir:1 },
      { len:sb,  type:"line", x0:W-R, y0:H,   dx:-1, dy:0  },
      { len:arc, type:"arc",  cx:R,   cy:H-R, start:Math.PI/2,  dir:1 },
      { len:sl,  type:"line", x0:0,   y0:H-R, dx:0,  dy:-1 },
      { len:arc, type:"arc",  cx:R,   cy:R,   start:Math.PI,    dir:1 },
    ];
    let cum = 0;
    for (const s of segs) {
      if (d <= cum + s.len) {
        const local = (d - cum) / s.len;
        if (s.type === "line") return { x: s.x0 + s.dx*s.len*local, y: s.y0 + s.dy*s.len*local };
        const a = s.start + s.dir * Math.PI/2 * local;
        return { x: s.cx + R*Math.cos(a), y: s.cy + R*Math.sin(a) };
      }
      cum += s.len;
    }
    return { x:R, y:0 };
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);
    const trailLen = 0.18, steps = 80;
    for (let i=0; i<=steps; i++) {
      const frac = i/steps;
      const t    = ((angle - trailLen*(1-frac)) % 1 + 1) % 1;
      const pt   = getRoundedRectPoint(t, W-6, H-6, R);
      const px=pt.x+3, py=pt.y+3;
      const alpha = Math.pow(frac, 1.5);
      const width = 1 + frac*5;
      if (i > 0) {
        const t2  = ((angle - trailLen*(1-(i-1)/steps)) % 1 + 1) % 1;
        const pt2 = getRoundedRectPoint(t2, W-6, H-6, R);
        ctx.beginPath(); ctx.moveTo(pt2.x+3, pt2.y+3); ctx.lineTo(px, py);
        ctx.strokeStyle = `rgba(100,140,255,${alpha*0.9})`; ctx.lineWidth=width; ctx.lineCap="round"; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pt2.x+3, pt2.y+3); ctx.lineTo(px, py);
        ctx.strokeStyle = `rgba(220,230,255,${alpha*frac})`; ctx.lineWidth=width*0.35; ctx.stroke();
      }
    }
    const hp = getRoundedRectPoint(angle, W-6, H-6, R);
    const hx=hp.x+3, hy=hp.y+3;
    const grd = ctx.createRadialGradient(hx,hy,0, hx,hy,10);
    grd.addColorStop(0,"rgba(255,255,255,0.95)");
    grd.addColorStop(0.3,"rgba(160,190,255,0.8)");
    grd.addColorStop(1,"rgba(44,82,232,0)");
    ctx.beginPath(); ctx.arc(hx,hy,10,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
    angle = (angle+speed)%1;
    saberRAF = requestAnimationFrame(draw);
  }
  if (saberRAF) cancelAnimationFrame(saberRAF);
  draw();
};

window.stopSaber = function() {
  if (saberRAF) { cancelAnimationFrame(saberRAF); saberRAF=null; }
  const c = document.getElementById("saber-canvas");
  if (c) c.getContext("2d").clearRect(0,0,c.width,c.height);
};

</script>
