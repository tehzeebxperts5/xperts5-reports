<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xperts5 – Daily Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:         #f0f4ff;
    --white:      #ffffff;
    --border:     #c5d3f0;
    --card-border:#7b9de0;
    --accent:     #1a3ccc;
    --accent2:    #2c52e8;
    --accent-lt:  #e8eeff;
    --accent-mid: #4a6ef5;
    --navy:       #0d1f6e;
    --text:       #0f1a3a;
    --muted:      #6b7daa;
    --muted2:     #b0bcd8;
    --danger:     #d93025;
    --radius:     18px;
    --shadow:     0 6px 28px rgba(26,60,204,0.10);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 0% 0%, rgba(44,82,232,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 100% 100%, rgba(13,31,110,0.06) 0%, transparent 60%);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1f6e 0%, #1a3ccc 60%, #2c52e8 100%);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 1.4rem 2.5rem 0;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 4px 24px rgba(13,31,110,0.25);
  }
  .header-top { display:flex; flex-direction:column; align-items:center; gap:1.1rem; margin-bottom:1.2rem; }
  .brand-row { display:flex; align-items:center; justify-content:center; gap:16px; }
  .brand-logo { height:56px; width:auto; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
  .brand-text { display:flex; flex-direction:column; line-height:1.1; }
  .brand-title { font-family:'Playfair Display',serif; font-size:1.9rem; font-weight:800; color:#fff; letter-spacing:-0.01em; text-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .brand-sub { font-size:0.7rem; font-weight:500; color:rgba(255,255,255,0.65); letter-spacing:0.12em; text-transform:uppercase; margin-top:2px; }

  /* ── ENTRY FORM ── */
  .entry-form {
    display:flex; gap:0.6rem; align-items:flex-end; flex-wrap:wrap; justify-content:center;
    background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.18);
    border-radius:14px; padding:0.85rem 1.2rem; backdrop-filter:blur(8px);
    width:100%; max-width:900px;
  }
  .ef-group { display:flex; flex-direction:column; gap:4px; }
  .ef-label { font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.7); }
  .ef-group select, .ef-group input[type="text"] {
    background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.25);
    border-radius:9px; padding:0.42rem 0.6rem; font-family:'Outfit',sans-serif;
    font-size:0.85rem; color:#ffffff; outline:none; height:36px;
    transition:border-color 0.2s, background 0.2s;
  }
  .ef-group select option { background:#1a3ccc; color:#fff; }
  .ef-group select:focus, .ef-group input:focus { border-color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.22); }
  .ef-group input::placeholder { color:rgba(255,255,255,0.5); }
  .ef-group.task-group { flex:1; min-width:200px; }
  .ef-group.task-group input { width:100%; }
  .btn-save {
    background:#ffffff; color:var(--accent); border:none; height:36px; padding:0 1.4rem;
    border-radius:9px; font-family:'Outfit',sans-serif; font-weight:700; font-size:0.84rem;
    cursor:pointer; white-space:nowrap; align-self:flex-end;
    transition:background 0.2s, transform 0.1s; letter-spacing:0.02em;
  }
  .btn-save:hover { background:var(--accent-lt); }
  .btn-save:active { transform:scale(0.97); }
  .btn-save:disabled { opacity:0.5; cursor:not-allowed; }

  /* ── DEPT TABS ── */
  .dept-tabs { display:flex; gap:2rem; align-items:center; justify-content:center; }
  .dept-tab {
    background:none; border:none; font-family:'Outfit',sans-serif; font-size:0.9rem;
    font-weight:600; color:rgba(255,255,255,0.55); cursor:pointer; padding:0.55rem 0;
    border-bottom:3px solid transparent; transition:color 0.2s, border-color 0.2s; white-space:nowrap;
  }
  .dept-tab:hover { color:rgba(255,255,255,0.85); }
  .dept-tab.active { color:#ffffff; border-bottom-color:#ffffff; }

  /* ── WEEK NAV ── */
  .week-nav {
    max-width:1200px; margin:1.6rem auto 0; padding:0 2rem;
    display:flex; align-items:center; gap:1rem; flex-wrap:wrap; justify-content:center;
  }
  .month-nav {
    display:flex; align-items:center; gap:0.4rem; background:var(--white);
    border:1.5px solid var(--border); border-radius:10px; padding:0.28rem 0.5rem; box-shadow:var(--shadow);
  }
  .mnav-btn {
    background:none; border:none; font-size:1rem; color:var(--muted); cursor:pointer;
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    border-radius:6px; transition:background 0.15s, color 0.15s;
  }
  .mnav-btn:hover { background:var(--accent-lt); color:var(--accent); }
  .month-label { font-weight:700; font-size:0.88rem; min-width:130px; text-align:center; color:var(--text); }
  .week-pills { display:flex; gap:0.4rem; flex-wrap:wrap; justify-content:center; }
  .week-pill {
    background:var(--white); border:1.5px solid var(--border); border-radius:8px;
    padding:0.32rem 0.9rem; font-size:0.78rem; font-weight:600; color:var(--muted);
    cursor:pointer; transition:all 0.2s; white-space:nowrap;
    box-shadow:0 1px 4px rgba(26,60,204,0.06);
  }
  .week-pill:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-lt); }
  .week-pill.active {
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-color:var(--accent); color:#fff; box-shadow:0 2px 10px rgba(26,60,204,0.25);
  }

  /* ── SYNC STATUS BAR ── */
  .sync-bar {
    max-width:1200px; margin:0.8rem auto 0; padding:0 2rem;
    display:flex; align-items:center; gap:0.5rem; justify-content:center;
  }
  .sync-dot {
    width:8px; height:8px; border-radius:50%; background:#aaa; flex-shrink:0;
    transition:background 0.3s;
  }
  .sync-dot.live { background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,0.5); }
  .sync-dot.saving { background:#f59e0b; animation:pulse 0.8s infinite; }
  .sync-dot.error { background:#ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-text { font-size:0.72rem; color:var(--muted); font-weight:500; }

  /* ── CONTENT ── */
  .content { max-width:1200px; margin:1.4rem auto 3rem; padding:0 2rem; }
  .cards-grid { display:grid; gap:1.25rem; }
  .cards-grid.count-5 { grid-template-columns:repeat(3,1fr); }
  .cards-grid.count-4 { grid-template-columns:repeat(4,1fr); }
  .cards-grid.count-3 { grid-template-columns:repeat(3,1fr); }
  .cards-grid.count-2 { grid-template-columns:repeat(2,1fr); max-width:660px; margin-left:auto; margin-right:auto; }
  .cards-grid.count-1 { grid-template-columns:1fr; max-width:340px; margin-left:auto; margin-right:auto; }
  .cards-grid.count-5 .last-row { grid-column:1/-1; display:flex; justify-content:center; gap:1.25rem; }
  .cards-grid.count-5 .last-row .emp-card { width:calc(33.33% - 0.84rem); max-width:380px; }

  /* ── EMPLOYEE CARD ── */
  .emp-card {
    background:var(--white); border:2px solid var(--card-border); border-radius:var(--radius);
    padding:1.2rem 1.3rem 1.3rem; cursor:pointer;
    transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    box-shadow:0 2px 12px rgba(26,60,204,0.07);
  }
  .emp-card:hover {
    transform:translateY(-4px);
    box-shadow:0 10px 32px rgba(26,60,204,0.14), 0 0 18px rgba(44,82,232,0.18);
    border-color:var(--accent);
  }
  .emp-card-name { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700; text-align:center; color:var(--navy); padding-bottom:0.5rem; margin-bottom:0.3rem; border-bottom:1.5px solid var(--border); }
  .emp-card-role { text-align:center; font-size:0.68rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent-mid); margin-bottom:0.85rem; }
  .card-rows { display:flex; flex-direction:column; }
  .card-row { display:grid; grid-template-columns:30px 70px 1fr; gap:0.4rem; padding:0.38rem 0; border-bottom:1px solid #edf0fa; align-items:flex-start; }
  .card-row:last-child { border-bottom:none; }
  .card-row-day { font-size:0.72rem; font-weight:700; color:var(--muted2); padding-top:1px; }
  .card-row-date { font-size:0.75rem; font-weight:600; color:var(--muted); padding-top:1px; white-space:nowrap; }
  .card-row-task { font-size:0.82rem; color:var(--text); line-height:1.5; word-break:break-word; }
  .card-row-empty .card-row-task { color:var(--muted2); font-style:italic; }
  .card-row-empty .card-row-day, .card-row-empty .card-row-date { opacity:0.45; }
  .card-row.today-row .card-row-date { color:var(--accent); font-weight:700; }
  .card-row.today-row .card-row-day  { color:var(--accent); }
  .card-empty-msg { text-align:center; color:var(--muted2); font-size:0.8rem; font-style:italic; padding:0.6rem 0; }

  /* ── LOADING SKELETON ── */
  .skeleton-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.25rem; }
  .skeleton-card { background:var(--white); border:2px solid var(--border); border-radius:var(--radius); padding:1.2rem 1.3rem; }
  .skel { background:linear-gradient(90deg,#e8eeff 25%,#d0d8f8 50%,#e8eeff 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
  .skel-title { height:24px; width:60%; margin:0 auto 0.8rem; }
  .skel-sub   { height:10px; width:40%; margin:0 auto 1rem; }
  .skel-row   { height:12px; width:100%; margin-bottom:0.5rem; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(13,31,110,0.45);
    z-index:200; align-items:center; justify-content:center; padding:1.5rem;
    backdrop-filter:blur(5px);
  }
  .modal-overlay.open { display:flex; }
  .modal-glow-wrap {
    position:relative; width:100%; max-width:620px; border-radius:24px;
    animation:zoomInWrap 0.22s ease; box-shadow:0 20px 60px rgba(13,31,110,0.25);
    isolation:isolate;
  }
  @keyframes zoomInWrap { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes zoomIn     { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-glow-wrap canvas.saber-canvas {
    position:absolute; inset:-6px; width:calc(100% + 12px); height:calc(100% + 12px);
    pointer-events:none; z-index:-1; border-radius:28px;
  }
  .modal-box {
    background:var(--white); border:none; border-radius:22px; width:100%;
    max-height:85vh; overflow-y:auto; padding:2rem 2.2rem 2.2rem; position:relative;
  }
  .modal-close {
    position:absolute; top:1rem; right:1rem; width:32px; height:32px;
    background:var(--accent-lt); border:1.5px solid var(--border); border-radius:8px;
    font-size:0.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--accent); font-weight:700; transition:background 0.2s;
  }
  .modal-close:hover { background:var(--border); }
  .modal-name { font-family:'Playfair Display',serif; font-size:2rem; font-weight:800; text-align:center; color:var(--navy); margin-bottom:0.25rem; }
  .modal-role { text-align:center; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent-mid); margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1.5px solid var(--border); }
  .modal-week-label { font-weight:700; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:0.7rem; }
  .modal-table { width:100%; border-collapse:collapse; }
  .modal-table thead th { padding:0.5rem 0.8rem; text-align:left; font-size:0.64rem; font-weight:700; text-transform:uppercase; letter-spacing:0.09em; color:var(--muted); border-bottom:2px solid var(--border); background:var(--accent-lt); }
  .modal-table tbody tr { border-bottom:1px solid #edf0fa; transition:background 0.1s; }
  .modal-table tbody tr:last-child { border-bottom:none; }
  .modal-table tbody tr:hover { background:var(--accent-lt); }
  .modal-table tbody td { padding:0.62rem 0.8rem; vertical-align:top; font-size:0.84rem; line-height:1.5; }
  .modal-table .col-day  { width:40px; font-weight:700; color:var(--muted); font-size:0.75rem; }
  .modal-table .col-date { width:80px; font-weight:600; color:var(--muted); font-size:0.75rem; white-space:nowrap; }
  .modal-table .col-task { color:var(--text); word-break:break-word; }
  .modal-table .col-del  { width:36px; text-align:right; }
  .modal-table .today-row .col-date { color:var(--accent); font-weight:700; }
  .modal-table .today-row .col-day  { color:var(--accent); }
  .modal-table .empty-row .col-task { color:var(--muted2); font-style:italic; font-size:0.78rem; }
  .btn-del-sm { background:none; border:1px solid #f0c5c5; color:var(--danger); width:24px; height:24px; border-radius:6px; font-size:0.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
  .btn-del-sm:hover { background:#fff0f0; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(14px); background:var(--navy); color:#fff; padding:0.65rem 1.4rem; border-radius:30px; font-size:0.84rem; font-weight:500; opacity:0; pointer-events:none; transition:opacity 0.28s, transform 0.28s; z-index:9999; white-space:nowrap; border:1px solid rgba(255,255,255,0.15); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.t-success { background:#0d4a1f; }
  .toast.t-warn    { background:#6a3d00; }
  .toast.t-error   { background:#7a0d0d; }

  /* ── RESPONSIVE ── */
  @media(max-width:900px) {
    .cards-grid.count-5,.cards-grid.count-4,.cards-grid.count-3 { grid-template-columns:repeat(2,1fr); }
    .cards-grid.count-5 .last-row { flex-direction:column; align-items:stretch; }
    .cards-grid.count-5 .last-row .emp-card { width:100%; max-width:100%; }
    .skeleton-grid { grid-template-columns:repeat(2,1fr); }
  }
  @media(max-width:600px) {
    header { padding:1.1rem 1.1rem 0; }
    .brand-title { font-size:1.3rem; }
    .brand-logo { height:40px; }
    .cards-grid.count-5,.cards-grid.count-4,.cards-grid.count-3,.cards-grid.count-2 { grid-template-columns:1fr; }
    .content,.week-nav,.sync-bar { padding:0 1rem; }
    .modal-box { padding:1.4rem 1.1rem 1.6rem; }
    .dept-tabs { gap:1rem; overflow-x:auto; padding-bottom:2px; }
    .skeleton-grid { grid-template-columns:1fr; }
  }
  </style>
</head>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc,
         deleteDoc, onSnapshot, query, orderBy }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── Firebase config ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyAssqhp2B3gEruY5fcK4wA-FaMQ9SGr-70",
  authDomain:        "xperts5-reports.firebaseapp.com",
  projectId:         "xperts5-reports",
  storageBucket:     "xperts5-reports.firebasestorage.app",
  messagingSenderId: "307346170489",
  appId:             "1:307346170489:web:2910f191d80747885caaa8"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Staff config ─────────────────────────────────────────────────────
const STAFF = [
  { name:"Tehzeeb",      role:"Graphic Designer · Video Editor", dept:"design" },
  { name:"Zain",         role:"Graphic Designer",                dept:"design" },
  { name:"Abdul Raheem", role:"Graphic Designer",                dept:"design" },
  { name:"Saleh",        role:"Social Media Manager",            dept:"social" },
  { name:"Momina",       role:"CSR",                             dept:"csr"    },
];

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_SHORT   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const today    = new Date();
let viewYear   = today.getFullYear();
let viewMonth  = today.getMonth();
let viewWeek   = 1;
let activeDept = "all";
let modalStaff = null;
let allEntries = {};   // key: "name_YYYY-MM-DD" → entry object

// ── Helpers ──────────────────────────────────────────────────────────
function toISO(d) {
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
const todayISO = toISO(today);

function fmtDisplay(iso) {
  const [y,m,d] = iso.split("-");
  return d+"-"+m+"-"+String(y).slice(2);
}
function fmtDay(iso) { return DAY_SHORT[new Date(iso+"T00:00:00").getDay()]; }

function getWeekRanges(year, month) {
  const dim = new Date(year, month+1, 0).getDate();
  return [
    { week:1, start:1,  end:7   },
    { week:2, start:8,  end:15  },
    { week:3, start:16, end:23  },
    { week:4, start:24, end:dim },
  ];
}
function getDates(year, month, start, end) {
  const out = [];
  for (let d=start; d<=end; d++) {
    const obj = new Date(year, month, d);
    if (obj.getDay() !== 0) out.push(toISO(obj));
  }
  return out;
}
function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── Sync status ───────────────────────────────────────────────────────
function setSyncStatus(state, text) {
  const dot  = document.getElementById("sync-dot");
  const label = document.getElementById("sync-text");
  dot.className  = "sync-dot " + state;
  label.textContent = text;
}

// ── Firebase real-time listener ───────────────────────────────────────
const entriesCol = collection(db, "entries");
const q = query(entriesCol, orderBy("date","asc"));

onSnapshot(q,
  (snapshot) => {
    allEntries = {};
    snapshot.forEach(docSnap => {
      const e = docSnap.data();
      allEntries[e.name + "_" + e.date] = { ...e, id: docSnap.id };
    });
    setSyncStatus("live", "Live — all data synced");
    renderCards();
    if (modalStaff) openModal(modalStaff);
  },
  (error) => {
    setSyncStatus("error", "Connection error — check internet");
    showToast("⚠️ Database error: " + error.message, "error");
  }
);

// ── Init date selects ─────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  populateDateSelects();
  const ranges = getWeekRanges(viewYear, viewMonth);
  const td = today.getDate();
  const found = ranges.find(r => td >= r.start && td <= r.end);
  if (found) viewWeek = found.week;
  renderNav();
});

function getDaysInMonth(month, year) { return new Date(year, month, 0).getDate(); }

function updateDays() {
  const dayEl  = document.getElementById("ef-day");
  const monEl  = document.getElementById("ef-month");
  const yearEl = document.getElementById("ef-year");
  const curDay = parseInt(dayEl.value) || 1;
  const month  = parseInt(monEl.value) || 1;
  const year   = parseInt(yearEl.value) || today.getFullYear();
  const maxDay = getDaysInMonth(month, year);
  dayEl.innerHTML = Array.from({length:maxDay},(_,i) =>
    `<option value="${String(i+1).padStart(2,"0")}">${String(i+1).padStart(2,"0")}</option>`
  ).join("");
  dayEl.value = String(Math.min(curDay, maxDay)).padStart(2,"0");
}

function populateDateSelects() {
  const monEl  = document.getElementById("ef-month");
  const yearEl = document.getElementById("ef-year");
  const mNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  monEl.innerHTML = mNames.map((m,i) =>
    `<option value="${String(i+1).padStart(2,"0")}">${m}</option>`
  ).join("");
  const yr = today.getFullYear();
  yearEl.innerHTML = [yr-1,yr,yr+1].map(y => `<option value="${y}">${y}</option>`).join("");
  monEl.value  = String(today.getMonth()+1).padStart(2,"0");
  yearEl.value = String(today.getFullYear());
  updateDays();
  document.getElementById("ef-day").value = String(today.getDate()).padStart(2,"0");
  monEl.addEventListener("change", updateDays);
  yearEl.addEventListener("change", updateDays);
}

function getSelectedISO() {
  const d = document.getElementById("ef-day").value;
  const m = document.getElementById("ef-month").value;
  const y = document.getElementById("ef-year").value;
  return `${y}-${m}-${d}`;
}

// ── Nav ───────────────────────────────────────────────────────────────
window.setDept = function(dept, el) {
  activeDept = dept;
  document.querySelectorAll(".dept-tab").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderCards();
};

window.shiftMonth = function(dir) {
  viewMonth += dir;
  if (viewMonth < 0)  { viewMonth=11; viewYear--; }
  if (viewMonth > 11) { viewMonth=0;  viewYear++; }
  viewWeek = 1;
  renderNav();
  renderCards();
};

window.selectWeek = function(w) {
  viewWeek = w;
  renderNav();
  renderCards();
  if (modalStaff) openModal(modalStaff);
};

function renderNav() {
  document.getElementById("month-label").textContent = MONTH_NAMES[viewMonth]+" "+viewYear;
  const ranges = getWeekRanges(viewYear, viewMonth);
  document.getElementById("week-pills").innerHTML = ranges.map(r => `
    <button class="week-pill ${r.week===viewWeek?"active":""}" onclick="selectWeek(${r.week})">
      Week ${r.week} <span style="font-weight:400;opacity:.75">${r.start}–${r.end}</span>
    </button>
  `).join("");
}

// ── Render cards ──────────────────────────────────────────────────────
function renderCards() {
  const ranges  = getWeekRanges(viewYear, viewMonth);
  const range   = ranges.find(r => r.week === viewWeek);
  if (!range) return;
  const dates    = getDates(viewYear, viewMonth, range.start, range.end);
  const filtered = activeDept==="all" ? STAFF : STAFF.filter(s => s.dept===activeDept);
  const count    = filtered.length;

  const cardHTMLs = filtered.map(staff => {
    const rows = dates.map(iso => ({
      iso,
      entry: allEntries[staff.name+"_"+iso] || null
    }));
    const hasAny = rows.some(r => r.entry);
    let rowsHtml;
    if (!hasAny) {
      rowsHtml = "<div class=\"card-empty-msg\">No entries this week yet</div>";
    } else {
      rowsHtml = "<div class=\"card-rows\">" +
        rows.map(r => `
          <div class="card-row ${r.iso===todayISO?"today-row":""} ${r.entry?"":"card-row-empty"}">
            <div class="card-row-day">${fmtDay(r.iso)}</div>
            <div class="card-row-date">${fmtDisplay(r.iso)}</div>
            <div class="card-row-task">${r.entry ? escHtml(r.entry.tasks) : "—"}</div>
          </div>
        `).join("") + "</div>";
    }
    return `<div class="emp-card" onclick="openModal('${staff.name}')">
      <div class="emp-card-name">${staff.name}</div>
      <div class="emp-card-role">${staff.role}</div>
      ${rowsHtml}
    </div>`;
  });

  const grid = document.getElementById("cards-grid");
  grid.className = "cards-grid count-"+count;
  if (count === 5) {
    grid.innerHTML = cardHTMLs.slice(0,3).join("") +
      "<div class=\"last-row\">" + cardHTMLs.slice(3).join("") + "</div>";
  } else {
    grid.innerHTML = cardHTMLs.join("");
  }
}

// ── Submit ────────────────────────────────────────────────────────────
window.submitEntry = async function() {
  const name  = document.getElementById("ef-name").value;
  const date  = getSelectedISO();
  const tasks = document.getElementById("ef-task").value.trim();
  if (!name || !date || !tasks) { showToast("⚠️ Please fill in all fields.", "warn"); return; }

  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Saving...";
  setSyncStatus("saving", "Saving entry...");

  try {
    const docId = name + "_" + date;
    await setDoc(doc(db, "entries", docId), { name, date, tasks, updatedAt: Date.now() });

    // Navigate to correct week
    const d = new Date(date+"T00:00:00");
    viewYear  = d.getFullYear();
    viewMonth = d.getMonth();
    const ranges = getWeekRanges(viewYear, viewMonth);
    const found  = ranges.find(r => d.getDate()>=r.start && d.getDate()<=r.end);
    if (found) viewWeek = found.week;
    renderNav();

    document.getElementById("ef-task").value = "";
    showToast("✅ Saved for "+name+"!", "success");
  } catch(err) {
    setSyncStatus("error", "Save failed");
    showToast("❌ Error: " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Save";
  }
};

// ── Delete ────────────────────────────────────────────────────────────
window.deleteEntry = async function(docId, event) {
  event.stopPropagation();
  if (!confirm("Delete this entry?")) return;
  try {
    await deleteDoc(doc(db, "entries", docId));
    showToast("🗑️ Entry deleted.", "warn");
  } catch(err) {
    showToast("❌ Delete failed: " + err.message, "error");
  }
};

// ── Modal ─────────────────────────────────────────────────────────────
window.openModal = function(staffName) {
  modalStaff = staffName;
  const staff  = STAFF.find(s => s.name===staffName);
  const ranges = getWeekRanges(viewYear, viewMonth);
  const range  = ranges.find(r => r.week===viewWeek);
  if (!range) return;
  const dates = getDates(viewYear, viewMonth, range.start, range.end);
  const rows  = dates.map(iso => ({
    iso, day: fmtDay(iso),
    entry: allEntries[staffName+"_"+iso] || null
  }));
  document.getElementById("modal-content").innerHTML = `
    <div class="modal-name">${staffName}</div>
    <div class="modal-role">${staff.role}</div>
    <div class="modal-week-label">Week ${viewWeek} · ${MONTH_NAMES[viewMonth]} ${viewYear} · ${range.start}–${range.end} ${MONTH_NAMES[viewMonth]}</div>
    <table class="modal-table">
      <thead><tr><th>Day</th><th>Date</th><th>Tasks Done</th><th></th></tr></thead>
      <tbody>
        ${rows.map(r => `
          <tr class="${r.iso===todayISO?"today-row":""} ${r.entry?"":"empty-row"}">
            <td class="col-day">${r.day}</td>
            <td class="col-date">${fmtDisplay(r.iso)}</td>
            <td class="col-task">${r.entry ? escHtml(r.entry.tasks) : "No entry"}</td>
            <td class="col-del">${r.entry ? `<button class="btn-del-sm" onclick="deleteEntry('${r.entry.id}',event)">✕</button>` : ""}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
  document.getElementById("modal").classList.add("open");
  setTimeout(startSaber, 50);
};

window.closeModal = function() {
  document.getElementById("modal").classList.remove("open");
  modalStaff = null;
  stopSaber();
};

window.handleModalClick = function(e) {
  const overlay = document.getElementById("modal");
  const wrap    = document.getElementById("modal-glow-wrap");
  if (e.target === overlay) closeModal();
};

// ── Toast ─────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast show t-"+type;
  setTimeout(() => t.className = "toast", 3200);
}

// ── Saber animation ───────────────────────────────────────────────────
let saberRAF = null;
window.startSaber = function() {
  const canvas = document.getElementById("saber-canvas");
  const wrap   = document.getElementById("modal-glow-wrap");
  if (!canvas || !wrap) return;
  canvas.width  = wrap.offsetWidth  + 12;
  canvas.height = wrap.offsetHeight + 12;
  const ctx   = canvas.getContext("2d");
  const R     = 24;
  let   angle = 0;
  const speed = 0.0018;

  function getRoundedRectPoint(t, W, H, R) {
    const arc   = Math.PI/2 * R;
    const st    = W-2*R, sr = H-2*R, sb = W-2*R, sl = H-2*R;
    const total = 2*(st+sr) + 4*arc;
    const d = t * total;
    const segs = [
      { len:st,  type:"line", x0:R,   y0:0,   dx:1,  dy:0  },
      { len:arc, type:"arc",  cx:W-R, cy:R,   start:-Math.PI/2, dir:1 },
      { len:sr,  type:"line", x0:W,   y0:R,   dx:0,  dy:1  },
      { len:arc, type:"arc",  cx:W-R, cy:H-R, start:0,          dir:1 },
      { len:sb,  type:"line", x0:W-R, y0:H,   dx:-1, dy:0  },
      { len:arc, type:"arc",  cx:R,   cy:H-R, start:Math.PI/2,  dir:1 },
      { len:sl,  type:"line", x0:0,   y0:H-R, dx:0,  dy:-1 },
      { len:arc, type:"arc",  cx:R,   cy:R,   start:Math.PI,    dir:1 },
    ];
    let cum = 0;
    for (const s of segs) {
      if (d <= cum + s.len) {
        const local = (d - cum) / s.len;
        if (s.type === "line") return { x: s.x0 + s.dx*s.len*local, y: s.y0 + s.dy*s.len*local };
        const a = s.start + s.dir * Math.PI/2 * local;
        return { x: s.cx + R*Math.cos(a), y: s.cy + R*Math.sin(a) };
      }
      cum += s.len;
    }
    return { x:R, y:0 };
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);
    const trailLen = 0.18, steps = 80;
    for (let i=0; i<=steps; i++) {
      const frac = i/steps;
      const t    = ((angle - trailLen*(1-frac)) % 1 + 1) % 1;
      const pt   = getRoundedRectPoint(t, W-6, H-6, R);
      const px=pt.x+3, py=pt.y+3;
      const alpha = Math.pow(frac, 1.5);
      const width = 1 + frac*5;
      if (i > 0) {
        const t2  = ((angle - trailLen*(1-(i-1)/steps)) % 1 + 1) % 1;
        const pt2 = getRoundedRectPoint(t2, W-6, H-6, R);
        ctx.beginPath(); ctx.moveTo(pt2.x+3, pt2.y+3); ctx.lineTo(px, py);
        ctx.strokeStyle = `rgba(100,140,255,${alpha*0.9})`; ctx.lineWidth=width; ctx.lineCap="round"; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pt2.x+3, pt2.y+3); ctx.lineTo(px, py);
        ctx.strokeStyle = `rgba(220,230,255,${alpha*frac})`; ctx.lineWidth=width*0.35; ctx.stroke();
      }
    }
    const hp = getRoundedRectPoint(angle, W-6, H-6, R);
    const hx=hp.x+3, hy=hp.y+3;
    const grd = ctx.createRadialGradient(hx,hy,0, hx,hy,10);
    grd.addColorStop(0,"rgba(255,255,255,0.95)");
    grd.addColorStop(0.3,"rgba(160,190,255,0.8)");
    grd.addColorStop(1,"rgba(44,82,232,0)");
    ctx.beginPath(); ctx.arc(hx,hy,10,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
    angle = (angle+speed)%1;
    saberRAF = requestAnimationFrame(draw);
  }
  if (saberRAF) cancelAnimationFrame(saberRAF);
  draw();
};

window.stopSaber = function() {
  if (saberRAF) { cancelAnimationFrame(saberRAF); saberRAF=null; }
  const c = document.getElementById("saber-canvas");
  if (c) c.getContext("2d").clearRect(0,0,c.width,c.height);
};
